# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# monitor=,highres,auto,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = dolphin
# $menu = hyprlauncher
$menu = tofi-drun

# --- DUAL MONITOR SETUP ---

# 1. Main Laptop screen
monitor = eDP-2, 1920x1080@144, 0x0, 1.20

misc {
    vrr = 1
}

# 2. Tablet (Virtual/Headless)
monitor = HEADLESS-2, 1280x720@30, 1600x0, 1

workspace = 1, monitor:eDP-2
workspace = 2, monitor:eDP-2
workspace = 3, monitor:eDP-2
workspace = 4, monitor:eDP-2
workspace = 5, monitor:eDP-2

workspace = 6, monitor:HEADLESS-2
workspace = 7, monitor:HEADLESS-2
workspace = 8, monitor:HEADLESS-2
workspace = 9, monitor:HEADLESS-2
#################
### AUTOSTART ###
#################
# See https://wiki.hypr.land/Configuring/Environment-variables/
env = XCURSOR_THEME,Catppuccin-Mocha-Dark-Cursors
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24


# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
# --- CRITICAL STARTUP (From Safe Mode) ---
# 1. Update system variables so Portals know we are in Hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# 2. Kill any old portals and start the correct one manually
exec-once = killall xdg-desktop-portal-hyprland xdg-desktop-portal-wlr xdg-desktop-portal
exec-once = sleep 1 && /usr/lib/xdg-desktop-portal-hyprland &
exec-once = sleep 2 && /usr/lib/xdg-desktop-portal &

# exec-once = $terminal
exec-once = hyprshade on vibrance
# exec-once = nm-applet &
exec-once = waybar 
# wallpaper 
# Use the ampersand to run it in the background
# exec-once = awww-daemon --format xrgb &
# Optional: Wait 1 second before setting the image to ensure the daemon is ready
# exec-once = awww img /home/asitos/skong.gif
exec-once = swww-daemon --format xrgb
# exec-once = sleep 1 && swww img /home/asitos/Downloads/nord_minimal_cat.png
exec-once = sleep 1 && swww img /home/asitos/Downloads/wallpapers/wallhaven-zpxl5w.png

exec-once = clipse -listen

# Start the KDE Connect Daemon and Indicator
exec-once = /usr/lib/kdeconnectd
exec-once = kdeconnect-indicator


# exec-once = ~/.config/Scripts/tablet_screen.sh
exec-once = ~/.config/Scripts/battery_notif.sh
# exec-once = vesktop
exec-once = spotify
exec-once = galaxybudsclient /StartMinimized
# TABLET SCREEN Apps

windowrule = workspace 4, match:class ^(vesktop)$

windowrule = workspace 5 silent, match:class ^(spotify)$
windowrule = workspace 5 silent, match:title ^(spotify)$
#############################
### ENVIRONMENT VARIABLES ###
#############################

#NVIDIA env variables

env = LIBVA_DRIVER_NAME,nvidia
env = XDG_SESSION_TYPE,wayland
env = GBM_BACKEND,nvidia-drm
env = __NV_PRIME_RENDER_OFFLOAD,1
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct
# env = WLR_NO_HARDWARE_CURSORS,1
# env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
